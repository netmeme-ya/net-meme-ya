    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const startScreen = document.getElementById('start-screen');
            const startButton = document.getElementById('start-button');
            const gameOverScreen = document.getElementById('game-over');
            const h1id = document.getElementById('h1id');
            const restartButton = document.getElementById('restart-button');
            const scoreDisplay = document.getElementById('score-display');
            const timerDisplay = document.getElementById('timer-display');
            const finalScore = document.getElementById('final-score');
            const finalTime = document.getElementById('final-time');
            const xButton = document.getElementById('x-button');
            const reButton = document.getElementById('re-button');
            const tomei = document.getElementById('tomei');
            const highScoreDisplay = document.getElementById('high-score-display');
            const highScoreMessage = document.getElementById('high-score-message');

            // ハイスコア取得(localStorage)
            const HIGH_SCORE_KEY = 'ar_highscore';
            function getHighScore() {
                try {
                    const v = localStorage.getItem(HIGH_SCORE_KEY);
                    const n = parseInt(v, 10);
                    return isNaN(n) ? 0 : n;
                } catch (e) {
                    return 0;
                }
            }
            function setHighScore(value) {
                try {
                    localStorage.setItem(HIGH_SCORE_KEY, String(value));
                } catch (e) {
                    // localStorage 利用不可の環境では何もしない
                }
            }
            function updateHighScoreDisplay() {
                if (highScoreDisplay) {
                    highScoreDisplay.textContent = `HIGH SCORE: ${getHighScore()}`;
                }
            }
            // 初回表示
            updateHighScoreDisplay();

            // 隠しリセットボタン: ハイスコアを0にリセット
            const resetIdBtn = document.getElementById('reset_id');
            if (resetIdBtn) {
                resetIdBtn.addEventListener('click', () => {
                    setHighScore(0);
                    updateHighScoreDisplay();
                });
            }
            //プレイヤー画像（後ろ向き）の配置
            const playerImage = new Image();
            playerImage.src = 'zdm.png';
            //開始時・クリア時の正面向き
            const playerImage2 = new Image();
            playerImage2.src = 'zdm2.png';
            let gameActive = false;
            let score = 0;
            let gameTime = 0;
            let timerInterval;
            let shootingDirection = (Math.PI / 2) * -1; // Default upward (90 degrees)
            let playerX, playerY;
            let stickX, stickY;
            let bullets = [];
            let enemies = [];
            let bloodstains = [];
            let lastShootTime = 0;
            let shootInterval = 100; // 0.2秒ごと
            let difficulty = 1;
            let difficultyIncreaseInterval;
            let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

            // Resize canvas to fit container
            function resizeCanvas() {
                const container = document.getElementById('game-container');
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;

                if (gameActive) {
                    playerX = canvas.width / 2;
                    playerY = canvas.height - 250;
                }
            }

            function updateTimerDisplay() {
                const totalSeconds = Math.floor(gameTime / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const tenths = Math.floor((gameTime % 1000) / 100);

                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${tenths}`;
            }

            // グローバル変数
            let maxEnemies = 5;
            let enemyIncreaseInterval;
            let enemyBurstInterval;
            let burstCount = 0;
            let isTimeOver = false;

            function initGame() {
                resizeCanvas();
                gameActive = true;
                score = 0;
                gameTime = 0;
                bullets = [];
                enemies = [];
                bloodstains = [];
                maxEnemies = 5;
                difficulty = 1;
                burstCount = 0;

                // プレイヤーの初期位置を設定
                playerX = canvas.width / 2;
                playerY = canvas.height - 200;

                // **ここで stickX, stickY を初期化**
                stickX = canvas.width / 2;  // 画面中央
                stickY = playerY + 70;      // プレイヤーの高さ+70

                scoreDisplay.textContent = `Score: ${score}`;
                timerDisplay.textContent = '00:00.0';

                startScreen.style.display = 'none';
                gameOverScreen.style.display = 'none';

                // ゲーム開始時にヘッダー類を表示
                document.getElementById('head_div').style.display = 'block';
                scoreDisplay.style.display = 'block';
                timerDisplay.style.display = 'block';

                // タイマーや難易度設定
                timerInterval = setInterval(() => {
                    gameTime += 100;
                    updateTimerDisplay();
                    //タイムアップ設定
                    let min = 3;
                    let sec = 0;
                    let timeup = (min * 60 + sec) * 1000; // 例: (9*60 + 59) * 1000 = 599000ミリ秒
                    if (gameTime >= timeup) {
                        isTimeOver = true;
                        endGame();
                    }
                }, 100);
                //3秒ごとに早くなる
                difficultyIncreaseInterval = setInterval(() => {
                    difficulty += 0.1;
                }, 3000);
                //3秒ごとに1体増える
                enemyIncreaseInterval = setInterval(() => {
                    maxEnemies += 1;
                }, 3000);
                //10秒ごとに3*秒数の敵を出現
                //(10秒=10体・20秒=20体・30秒=30体・・・)
                enemyBurstInterval = setInterval(() => {
                    burstCount++;
                    const elapsedSec = burstCount * 10;
                    const spawnNum = 1* elapsedSec;
                    spawnEnemyBurst(spawnNum);
                }, 10000);

                requestAnimationFrame(gameLoop);
                spawnEnemies();
            }


            function spawnEnemies() {
                if (!gameActive) return;

                // enemies配列の数が不足している場合のみ追加
                while (enemies.length < maxEnemies) {
                    // 上からのみ出現
                    let spawnX = Math.random() * canvas.width;  // 横方向はランダム
                    let spawnY = -20;                           // 画面外の上端から出現

                    // プレイヤーに向かう角度を計算
                    const baseAngle = Math.PI / 2;
                    const targetAngle = Math.atan2(playerY - spawnY, playerX - spawnX);
                    let angle;
                    if (spawnX < playerX) {
                        // 左側にいる場合: targetAngle は baseAngle より小さい前提
                        angle = targetAngle + Math.random() * (baseAngle - targetAngle);
                    } else {
                        // 右側にいる場合: targetAngle は baseAngle より大きい前提
                        angle = baseAngle + Math.random() * (targetAngle - baseAngle);
                    }
                    enemies.push({
                        x: spawnX,
                        y: spawnY,
                        angle: angle,
                        speed: 1 + Math.random() * difficulty,
                        size: 30
                    });
                }

                // 一定時間後に再度呼び出す
                setTimeout(spawnEnemies, 100);
            }

            // 指定数の敵を一気に出現させる(maxEnemies の枠とは別に追加)
            function spawnEnemyBurst(num) {
                if (!gameActive) return;

                for (let i = 0; i < num; i++) {
                    let spawnX = Math.random() * canvas.width;
                    let spawnY = -20 - Math.random() * 200; // 縦に少し散らす(連なって降ってくる演出)

                    const baseAngle = Math.PI / 2;
                    const targetAngle = Math.atan2(playerY - spawnY, playerX - spawnX);
                    let angle;
                    if (spawnX < playerX) {
                        angle = targetAngle + Math.random() * (baseAngle - targetAngle);
                    } else {
                        angle = baseAngle + Math.random() * (targetAngle - baseAngle);
                    }
                    enemies.push({
                        x: spawnX,
                        y: spawnY,
                        angle: angle,
                        speed: 1 + Math.random() * difficulty,
                        size: 30
                    });
                }
            }


            function shoot() {
                if (!gameActive) return;

                const currentTime = Date.now();
                if (currentTime - lastShootTime >= shootInterval) {
                    bullets.push({
                        x: playerX,
                        y: playerY,
                        angle: shootingDirection,
                        speed: 5,
                        size: 10
                    });

                    lastShootTime = currentTime;
                }
            }

            function gameLoop() {
                if (!gameActive) return;

                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // ● ずんだもちを描画 (緑の丸を表示)
                bloodstains.forEach(stain => {
                    // 下半分（0～π）を塗りつぶし
                    ctx.beginPath();
                    ctx.fillStyle = '#f1f1f1'; // 餅白
                    ctx.ellipse(stain.x, stain.y, 15, 10, 0, 5, 0, Math.PI, false);
                    ctx.fill();

                    // 上半分（π～2π）を塗りつぶし
                    ctx.beginPath();
                    ctx.fillStyle = '#56e86f'; // 緑色
                    ctx.ellipse(stain.x, stain.y, 15, 10, 0, Math.PI, 2 * Math.PI, false);
                    ctx.fill();
                });

                // Auto shoot
                shoot();

                // Update and draw bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const bullet = bullets[i];

                    // Move bullet
                    bullet.x += Math.cos(bullet.angle) * bullet.speed;
                    bullet.y += Math.sin(bullet.angle) * bullet.speed;

                    // Check if bullet is out of bounds
                    if (bullet.x < -50 || bullet.x > canvas.width + 50 ||
                        bullet.y < -50 || bullet.y > canvas.height + 50) {
                        bullets.splice(i, 1);
                        continue;
                    }

                    // Draw bullet (triangle pointing in movement direction)
                    ctx.save();
                    ctx.translate(bullet.x, bullet.y);
                    ctx.rotate(bullet.angle);
                    ctx.fillStyle = '#33FF00';
                    ctx.beginPath();
                    ctx.moveTo(bullet.size, 0);
                    ctx.lineTo(-bullet.size / 2, bullet.size / 2);
                    ctx.lineTo(-bullet.size / 2, -bullet.size / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();

                    // コントロールスティックの描画
                    const baseX = playerX;
                    const baseY = playerY + 70;

                    // 外側の大きな灰色の丸（直径60、半径30）
                    ctx.fillStyle = 'gray';
                    ctx.beginPath();
                    ctx.arc(baseX, baseY, 30, 0, Math.PI * 2);
                    ctx.fill();

                    // 外側の大きな灰色の丸（直径60、半径30）
                    ctx.fillStyle = 'black';
                    ctx.beginPath();
                    ctx.arc(baseX, baseY, 16, 0, Math.PI * 2);
                    ctx.fill();

                    // 内側の赤い丸（直径30、半径15）→stickX, stickY を中心に描画
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.arc(stickX, stickY, 15, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Update and draw enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];

                    // Move enemy
                    enemy.x += Math.cos(enemy.angle) * enemy.speed;
                    enemy.y += Math.sin(enemy.angle) * enemy.speed;

                    // Draw enemy (白い円)
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.ellipse(enemy.x, enemy.y, enemy.size / 2, enemy.size / 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = '#000000';
                    ctx.stroke();

                    // Check collision with player
                    const dx = enemy.x - playerX;
                    const dy = enemy.y - playerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (enemy.y > playerY) {
                        endGame();
                        return;
                    }

                    // Check collision with bullets
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        const bullet = bullets[j];
                        const bx = bullet.x - enemy.x;
                        const by = bullet.y - enemy.y;
                        const bDistance = Math.sqrt(bx * bx + by * by);

                        if (bDistance < enemy.size / 2 + bullet.size / 2) {
                            // 衝突時、血痕★を衝突位置に配置
                            bloodstains.push({ x: enemy.x, y: enemy.y });
                            // 衝突した敵と弾丸を削除し、スコアを加算
                            enemies.splice(i, 1);
                            bullets.splice(j, 1);
                            score++;
                            scoreDisplay.textContent = `Zunda: ${score}`;
                            break;
                        }
                    }
                }

                // Draw player
                ctx.drawImage(playerImage, playerX - 39 / 2, playerY - 42 / 2, 39, 42);

                //GameOverライン
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, playerY + 15);
                ctx.lineTo(canvas.width, playerY + 15);
                ctx.stroke();

                // Draw shooting direction indicator
                ctx.strokeStyle = '#555555';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(playerX, playerY);
                ctx.lineTo(
                    playerX + Math.cos(shootingDirection) * 40,
                    playerY + Math.sin(shootingDirection) * 40
                );
                ctx.stroke();

                requestAnimationFrame(gameLoop);
            }

            function endGame() {
                gameActive = false;
                clearInterval(timerInterval);
                clearInterval(difficultyIncreaseInterval);
                clearInterval(enemyIncreaseInterval);
                clearInterval(enemyBurstInterval);

                enemies = [];
                ctx.drawImage(playerImage2, playerX - 41 / 2, playerY - 42 / 2, 41, 42);

                finalScore.textContent = `ずんだ餅: ${score}`;
                finalTime.textContent = `Time: ${timerDisplay.textContent}`;

                // ハイスコア判定・更新・メッセージ表示
                const prevHighScore = getHighScore();
                if (score > prevHighScore && score > 0) {
                    setHighScore(score);
                    if (highScoreMessage) {
                        highScoreMessage.style.display = 'block';
                    }
                } else {
                    if (highScoreMessage) {
                        highScoreMessage.style.display = 'none';
                    }
                }
                updateHighScoreDisplay();
                //twitterコメント
                const twButton = document.getElementById('tw-button');               
                const tweetText = `ずんだアローに挑戦！ずんだ餅：${score}個！TIME：${timerDisplay.textContent}！両面アクリルフィギュアセット発売記念！#ずんだもん #ずんだゲーム ${baseUrl}`;
                const tweetUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}`;
                twButton.href = tweetUrl;
                //ヘッダー黒帯
                const head_div = document.getElementById('head_div');
                head_div.style.background = "rgba(0,0,0,0.3)"
                gameOverScreen.style.display = 'flex';
                if (isTimeOver && h1id) {
                    h1id.textContent = "すばらしい！";
                    h1id.style.color = "#ff00e4";
                }
            }

            // Get canvas-relative coordinates
            function getCanvasPosition(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            // Update shooting direction based on pointer position
            function updateShootingDirection(x, y) {
                if (!gameActive) return;
                // コントロールスティックのベース位置
                const baseX = playerX;
                const baseY = playerY + 70;
                // 入力位置とベースとのオフセットを計算
                let dx = x - baseX;
                let dy = y - baseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const maxOffset = 15; // 内側の丸の半径（赤丸の半径は15px）
                if (distance > maxOffset) {
                    // オフセットをクランプ
                    const ratio = maxOffset / distance;
                    dx *= ratio;
                    dy *= ratio;
                }
                // 赤い丸（スティック）の位置を更新
                stickX = baseX + dx;
                stickY = baseY + dy;
                // ここで発射角度は、ベース位置から赤丸の位置への角度を採用
                shootingDirection = Math.atan2(dy, dx);
            }

            // Event listeners
            startButton.addEventListener('click', initGame);
            restartButton.addEventListener('click', initGame);
            let isGameoverNOhyoji = false;
            xButton.addEventListener('click', () => {
                isGameoverNOhyoji = true;
                gameOverScreen.style.display = 'none';
                reButton.style.display = 'block';
                tomei.style.display = 'block';
            });
            reButton.addEventListener('click', () => {
                if (isGameoverNOhyoji) {
                    isGameoverNOhyoji = false;
                    gameOverScreen.style.display = 'flex';
                    reButton.style.display = 'none';
                    tomei.style.display = 'none';
                }
            });
            tomei.addEventListener('click', () => {
                if (isGameoverNOhyoji) {
                    isGameoverNOhyoji = false;
                    gameOverScreen.style.display = 'flex';
                    reButton.style.display = 'none';
                    tomei.style.display = 'none';
                }
            });

            // Handle both mouse and touch events
            // Mouse events
            canvas.addEventListener('mousemove', (e) => {
                if (!gameActive || isTouchDevice) return;

                const pos = getCanvasPosition(e.clientX, e.clientY);
                updateShootingDirection(pos.x, pos.y);
            });

            // Touch events
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!gameActive) return;

                const touch = e.touches[0];
                const pos = getCanvasPosition(touch.clientX, touch.clientY);
                updateShootingDirection(pos.x, pos.y);
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!gameActive) return;

                const touch = e.touches[0];
                const pos = getCanvasPosition(touch.clientX, touch.clientY);
                updateShootingDirection(pos.x, pos.y);
            });

            // Resize handler
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        });
        
    </script>
</body>
