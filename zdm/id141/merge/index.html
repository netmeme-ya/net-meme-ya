<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#2a1a3e;--sbg:#b04cb0;--btn:#e8257a;--btnhow:#d93080;--btntop:#2244cc;
  --score:#00e5c0;--hbg:#1a0e2a;--font:'Noto Sans JP',sans-serif;
}
html,body{
  width:100%;height:100%;overflow:hidden;overscroll-behavior:none;
  touch-action:none;background:var(--bg);font-family:var(--font);
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
/* ---- START ---- */
#scr-start{
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100%;max-width:1024px;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  background:var(--sbg);
}
.s-hdr{width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0}
.s-icobtn{
  width:52px;height:52px;border-radius:50%;background:#fff;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.18);text-decoration:none;flex-shrink:0;
}
.s-icobtn svg{width:26px;height:26px;fill:#111;}
.s-title{font-family: "M PLUS Rounded 1c";font-size:clamp(48px,12vw,80px);font-weight:900;color:#fff;margin-top:40px;letter-spacing:2px;text-shadow:3px 3px 0 rgba(0,0,0,.2)}
.s-btns{display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:40px;width:85%;max-width:400px}
.s-btn{
  width:100%;padding:20px 0;border:none;border-radius:50px;
  font-family:var(--font);font-size:clamp(20px,5vw,26px);font-weight:700;
  cursor:pointer;transition:transform .1s;text-decoration:none;
  display:flex;align-items:center;justify-content:center;
}
.s-btn:active{transform:scale(.96)}
.s-btn-start{background:var(--btn);color:#fff;box-shadow:0 6px 0 #a01055}
.s-btn-how{background:var(--btnhow);color:#fff;box-shadow:0 6px 0 #8a0040}
.s-btn-top{background:var(--btntop);color:#fff;box-shadow:0 6px 0 #1133aa;margin-top:16px}
.s-hs{margin-top:20px;font-size:clamp(16px,4vw,20px);font-weight:700;color:#fff}
.s-copy{margin-top:auto;padding-bottom:16px;font-size:12px;color:rgba(255,255,255,.7)}
.s-flex_div{display: flex;width: 100%;justify-content: space-between;}
.s-flex_div .s-btn-top{width: 47%;}
/* ---- GAME ---- */
#scr-game{
  display:none;flex-direction:column;
  width:100%;height:100%;max-width:1024px;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  background:#252535;
}
#g-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px;background:#252535;flex-shrink:0;height:68px;
}
.g-icobtn{
  width:36px;height:36px;border-radius:50%;background:#fff;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.18);flex-shrink:0;
}
.g-icobtn svg{width:24px;height:24px;fill:#111;}
.score-box{display:flex;gap:12px}
.score-item{background:#1a1a2a;border-radius:10px;padding:5px 16px;text-align:center;min-width:90px}
.score-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1px}
.score-val{font-size:16px;font-weight:900;color:#fff;line-height:1.2}
.score-val.hi{color:var(--score)}

/* --- ゲームエリア（枠含む） --- */
#g-area{
  flex:1;position:relative;min-height:0;
  display:flex;flex-direction:column;align-items:stretch;
  background:#252535;
  padding:0 0 0 0;
}

/* ネクストキュー（ゲーム下部バー） */
#g-next{
  width: 90%;
  max-width: 220px;
  flex-shrink:0;
  height:60px;
  background:#1e1e2e;
  border-radius:28px;
  margin:8px auto;
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:0 20px;
  border:2px solid #3a3a50;
}
#g-next .nxt-lbl{
  font-size:11px;font-weight:700;color:rgba(255,255,255,.5);
  letter-spacing:1px;
}

/* 枠ラッパー：3:4フィールドを中央配置するコンテナ */
#g-frame-wrap{
  position:relative;
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:visible;
}

/* 実際の枠（JS側でサイズを動的設定） */
#g-field{
  position:relative;
  flex-shrink:0;
}

/* 左右の柱 */
#g-field::before,
#g-field::after{
  content:'';
  position:absolute;
  top:0;bottom:14px;
  width:18px;
  border-radius:10px 10px 0 0;
  background:linear-gradient(to right, #7a4070, #5a2a52);
  box-shadow:inset -2px 0 6px rgba(0,0,0,.3), inset 2px 0 4px rgba(255,255,255,.06);
  z-index:5;
  pointer-events:none;
}
#g-field::before{ left:0; }
#g-field::after{  right:0; }

/* 底板 */
#g-floor{
  position:absolute;
  bottom:0;left:0;right:0;
  height:14px;
  background:linear-gradient(to bottom, #7a4070, #5a2a52);
  z-index:5;
  pointer-events:none;
}

/* canvas本体（枠内側） */
#g-canvas{
  display:block;
  position:absolute;
  left:18px;right:18px;top:0;bottom:14px;
  cursor:crosshair;
  z-index:2;
}

/* ボールリストバー（スタート画面用） */
#s-bar{
  width:90%;max-width:480px;
  height:60px;
  background:rgba(0,0,0,.25);
  border-radius:28px;
  margin-top:24px;
  display:flex;align-items:center;justify-content:center;gap:2px;padding:0 8px;
  border:2px solid rgba(255,255,255,.15);
}
@media (max-width:440px){
  #s-bar{
    width: 100%;
    border-radius: 0;
  }

}
/* ---- ずんだもん到達バナー ---- */
#zunda-banner{
  display:none;
  position:absolute;
  inset:0;
  z-index:150;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
#zunda-banner.show{
  display:flex;
  pointer-events:auto;
}
#zunda-text{
  font-size:56px;
  font-weight:900;
  color:#fff;
  text-align:center;
  line-height:1.3;
  padding:24px 36px;
  border-radius:20px;
  background:linear-gradient(135deg,#1a6e1a,#44cc44,#1a6e1a);
  border:4px solid #aaff44;
  box-shadow:
    0 0 0 2px #1a6e1a,
    0 0 30px rgba(80,255,80,.7),
    0 0 60px rgba(80,255,80,.4),
    0 8px 32px rgba(0,0,0,.6);
  text-shadow:
    0 0 10px #aaffaa,
    0 0 30px #44ff44,
    2px 2px 0 #004400,
    -2px -2px 0 #004400;
  letter-spacing:2px;
  transform:translateY(80px);
  opacity:1;
  transition:transform .45s cubic-bezier(.17,.67,.35,1.3), opacity .35s ease;
}
@media (max-width:440px){
#zunda-text{
  font-size: 9vw;
}
}
#zunda-banner.show #zunda-text{
  transform:translateY(0);
  opacity:1;
}
#zunda-banner.hide #zunda-text{
  transform:translateY(-60px);
  opacity:0;
  transition:transform .3s ease-in, opacity .25s ease-in;
}
#go-ov{
  display:none;position:absolute;inset:0;
  background:rgba(10,5,20,.88);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;
}
#go-ov.show{display:flex}
.go-panel{
  background:#3a1a5a;border-radius:24px;padding:36px 44px;text-align:center;
  border:2px solid #6a3a8a;box-shadow:0 0 40px rgba(100,30,150,.5);
}
.go-ttl{font-size:40px;font-weight:900;color:#ff4488;margin-bottom:20px;text-shadow:0 0 20px rgba(255,68,136,.5)}
.go-slbl{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:2px}
.go-sval{font-size:52px;font-weight:900;color:#fff;margin-bottom:14px}
.go-hlbl{font-size:12px;color:rgba(255,255,255,.55)}
.go-hval{font-size:26px;font-weight:700;color:var(--score);margin-bottom:28px}
.go-btn{
  display:block;width:100%;padding:16px 0;border-radius:50px;border:none;
  font-family:var(--font);font-size:18px;font-weight:700;cursor:pointer;
  margin-bottom:12px;transition:transform .1s;
}
.go-btn:active{transform:scale(.96)}
.go-btn-retry{background:var(--btn);color:#fff;box-shadow:0 5px 0 #a01055}
.go-btn-top{background:var(--btntop);color:#fff;box-shadow:0 5px 0 #1133aa}
</style>

<script>
(function(){
'use strict';

// ===== ボール定義 =====
// ボール定義（rはW確定後にinitBallRadii()で設定）
const BT = [
  {rr:0.04,   color:'#4488ff', score:1,  r:0},
  {rr:0.048,  color:'#ff6666', score:3,  r:0},
  {rr:0.0577, color:'#ff99bb', score:6,  r:0},
  {rr:0.0693, color:'#ffcc00', score:10, r:0},
  {rr:0.0833, color:'#bb44cc', score:15, r:0},
  {rr:0.1,    color:'#ff8800', score:21, r:0},
  {rr:0.1201, color:'#dd2222', score:28, r:0},
  {rr:0.1443, color:'#ffee00', score:36, r:0},
  {rr:0.1733, color:'#228822', score:45, r:0},
  {rr:0.2081, color:'#00aaff', score:55, r:0},
  {rr:0.25,   color:'#66bb22', score:66, r:0},
];
function initBallRadii(){ BT.forEach(b => { b.r = Math.round(b.rr * W); }); }

const MAX_DROP = (typeof testflg!=='undefined' && testflg) ? 9 : 4;
const DANGER_RATIO = 0.20;
const DANGER_LIMIT = 180; // フレーム数

// ===== 状態 =====
let W=0, H=0;
let engine, runner;
let canvas, ctx;
let score=0, highScore=0, soundOn=true;
let gameOver=false, dropCooldown=false, showBall=true;
let curX=0, dangerFrames=0;
let curLevel=0, nextQ=[];
let mergeQ=[];
// body.id -> level のMap
let bodyMap = new Map();
let ballImages=[], imagesOK=false;
let rafId=null;

// ===== ストレージ =====
function loadSt(){
  const s=localStorage.getItem('su_sound');
  soundOn=(s===null)?true:(s==='true');
  highScore=parseInt(localStorage.getItem('su_point')||'0',10);
}
function saveSnd(){ localStorage.setItem('su_sound', soundOn?'true':'false'); }
function saveHi(){  localStorage.setItem('su_point', String(highScore)); }

// ===== 音声 =====
// ===== iOS判定 =====
const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) ||
  (navigator.userAgent.includes('Mac') && navigator.maxTouchPoints > 1);

// ===== 音声 =====
function snd(id){
  if(!soundOn || isIOS) return; // SEはiOS非対応
  const el=document.getElementById(id);
  if(!el) return;
  try{ el.currentTime=0; el.play().catch(()=>{}); }catch(e){}
}

// 指定区間（秒）だけ再生してendで停止
let _segTimer=null;
function sndSegment(start, end){
  if(!soundOn || isIOS) return; // SEはiOS非対応
  const el=document.getElementById('se_c1');
  if(!el) return;
  if(_segTimer){ clearTimeout(_segTimer); _segTimer=null; }
  try{
    el.pause();
    el.currentTime=start;
    el.play().catch(()=>{});
    _segTimer=setTimeout(()=>{ try{el.pause();}catch(e){} _segTimer=null; }, (end-start)*1000);
  }catch(e){}
}

function bgmPlay(){
  if(!soundOn) return;
  const el=document.getElementById('bgm');
  if(!el) return;
  try{ el.currentTime=0; el.play().catch(()=>{}); }catch(e){}
}
function bgmStop(){
  const el=document.getElementById('bgm');
  if(!el) return;
  try{ el.pause(); el.currentTime=0; }catch(e){}
}

function audioUnlock(){
  if(isIOS) return; // iOSはSEアンロック不要
  ['se_drop','se_merge','se_c1'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.play().catch(()=>{});el.pause();el.currentTime=0;}
  });
}

// ===== 画像 =====
function loadImages(){
  let n=0;
  ballImages=[];
  for(let i=0;i<=10;i++){
    const img=new Image();
    img.onload =()=>{ n++; if(n===11){ imagesOK=true; buildBar(); } };
    img.onerror=()=>{ n++; if(n===11){ imagesOK=true; buildBar(); } };
    img.src=`pic/b${i}.png`;
    ballImages.push(img);
  }
}

// ===== UI =====
function updScore(){
  document.getElementById('sc-now').textContent=score.toLocaleString();
  document.getElementById('sc-hi').textContent=highScore.toLocaleString();
}
const SND_ON  = '<path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
const SND_OFF = '<path d="M3 9v6h4l5 4V5L7 9H3z"/><path fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" d="M15 9l5 6M20 9l-5 6"/>';
const SE_SRCS = {
  se_drop:  'pic/se_drop.mp3',
  se_merge: 'pic/se_merge.mp3',
  se_c1:    'pic/se_c1.mp3',
};
function updSnd(){
  const ico=soundOn?SND_ON:SND_OFF;
  document.getElementById('s-snd-icon').innerHTML=ico;
  document.getElementById('g-snd-icon').innerHTML=ico;
  // 音声OFF時はSE audioのsrcを空にしてAndroidの意図しない再生を防ぐ
  Object.keys(SE_SRCS).forEach(id=>{
    try{
      const el=document.getElementById(id);
      if(!el) return;
      if(!soundOn){
        el.pause(); el.removeAttribute('src'); el.load();
      } else {
        if(!el.getAttribute('src')){ el.src=SE_SRCS[id]; el.load(); }
      }
    }catch(e){}
  });
}
function updHs(){
  document.getElementById('s-hs').textContent='HIGHSCORE：'+highScore.toLocaleString();
}
function showStart(){
  document.getElementById('scr-start').style.display='flex';
  document.getElementById('scr-game').style.display='none';
  updHs(); updSnd(); buildBar();
}
function showGame(){
  document.getElementById('scr-start').style.display='none';
  document.getElementById('scr-game').style.display='flex';
  updSnd();
}

// ===== 物理 =====
function initPhysics(){
  if(engine){
    Matter.Runner.stop(runner);
    Matter.Engine.clear(engine);
    engine=null; runner=null;
  }
  engine=Matter.Engine.create({gravity:{x:0,y:2}});
  const world=engine.world;
  const T=60; // 壁厚

  // 底・左・右
  Matter.Composite.add(world,[
    Matter.Bodies.rectangle(W/2, H+T/2,   W+200, T,   {isStatic:true,label:'wall',restitution:0.2,friction:0.1}),
    Matter.Bodies.rectangle(-T/2,   H/2,   T,     H*3, {isStatic:true,label:'wall',restitution:0.2,friction:0.1}),
    Matter.Bodies.rectangle(W+T/2,  H/2,   T,     H*3, {isStatic:true,label:'wall',restitution:0.2,friction:0.1}),
  ]);

  Matter.Events.on(engine,'collisionStart',onCollision);

  runner=Matter.Runner.create();
  Matter.Runner.run(runner,engine);
}

function onCollision(ev){
  if(gameOver) return;
  for(const p of ev.pairs){
    const la=bodyMap.get(p.bodyA.id);
    const lb=bodyMap.get(p.bodyB.id);
    if(la===undefined||lb===undefined) continue;
    if(la!==lb||la>=10) continue;
    // 既にキュー済みでないか
    const dup=mergeQ.some(m=>
      m.a.id===p.bodyA.id||m.b.id===p.bodyA.id||
      m.a.id===p.bodyB.id||m.b.id===p.bodyB.id
    );
    if(!dup) mergeQ.push({a:p.bodyA,b:p.bodyB,lv:la});
  }
}

function addBall(x,y,lv,isStatic){
  const body=Matter.Bodies.circle(x,y,BT[lv].r,{
    restitution:0.2,friction:0.05,frictionAir:0.003,
    label:'ball',isStatic:!!isStatic,
  });
  bodyMap.set(body.id,lv);
  Matter.Composite.add(engine.world,body);
  return body;
}

function processMerge(){
  if(!mergeQ.length) return;
  const q=[...mergeQ]; mergeQ=[];
  for(const {a,b,lv} of q){
    if(!bodyMap.has(a.id)||!bodyMap.has(b.id)) continue;
    const mx=(a.position.x+b.position.x)/2;
    const my=(a.position.y+b.position.y)/2;
    Matter.Composite.remove(engine.world,a);
    Matter.Composite.remove(engine.world,b);
    bodyMap.delete(a.id);
    bodyMap.delete(b.id);
    const nlv=lv+1;
    addBall(mx,my,nlv,false);
    score+=BT[nlv].score;
    if(score>highScore){highScore=score;saveHi();}
    updScore();
    if(nlv===10){
      zunda10count++;
      if(zunda10count>=2){
        sndSegment(20, 24); // Wずんだ：20〜24秒
        showZundaBanner(true);
      } else {
        sndSegment(10, 14); // 初回スイカ：10〜14秒
        showZundaBanner(false);
      }
    } else {
      snd('se_merge');
    }
  }
}

// ===== ネクスト =====
function rndLv(){ return Math.floor(Math.random()*(MAX_DROP+1)); }
function initQ(){ curLevel=rndLv(); nextQ=[rndLv(),rndLv()]; }
function advQ(){ curLevel=nextQ.shift(); nextQ.push(rndLv()); updNextUI(); }

function updNextUI(){
  ['nc0','nc1'].forEach((id,i)=>{
    const c=document.getElementById(id);
    if(!c) return;
    const lv=nextQ[i];
    if(lv===undefined) return;
    const sz=c.width;
    const c2=c.getContext('2d');
    c2.clearRect(0,0,sz,sz);
    drawBall(c2,sz/2,sz/2,lv,sz/2-2);
  });
}

// ===== ドロップ =====
function drop(x){
  if(gameOver||dropCooldown) return;
  dropCooldown=true;
  const r=BT[curLevel].r;
  const cx=Math.max(r+2,Math.min(W-r-2,x));
  const dangerY=DANGER_RATIO*H;
  addBall(cx, dangerY-r-4, curLevel, false);
  snd('se_drop');
  advQ();
  showBall=false;
  setTimeout(()=>{ showBall=true; },300);
  setTimeout(()=>{ dropCooldown=false; },400);
}

// ===== ゲームオーバー判定 =====
function checkDanger(){
  if(gameOver) return;
  const dangerY=DANGER_RATIO*H;
  const bodies=Matter.Composite.allBodies(engine.world);
  let danger=false;
  for(const b of bodies){
    if(b.isStatic||b.label==='wall') continue;
    const lv=bodyMap.get(b.id);
    if(lv===undefined) continue;
    const spd=Math.hypot(b.velocity.x,b.velocity.y);
    if(b.position.y - BT[lv].r < dangerY && spd < 1.0){
      danger=true; break;
    }
  }
  if(danger){ dangerFrames++; if(dangerFrames>=DANGER_LIMIT) doGameOver(); }
  else dangerFrames=0;
}

function doGameOver(){
  if(gameOver) return;
  gameOver=true;
  bgmStop();
  sndSegment(5, 8); // ゲームオーバー：5〜8秒
  if(runner) Matter.Runner.stop(runner);
  document.getElementById('go-sc').textContent=score.toLocaleString();
  document.getElementById('go-hi').textContent=highScore.toLocaleString();
  document.getElementById('go-ov').classList.add('show');
}

// ===== 角丸矩形 =====
function rrect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

// ===== 描画 =====
function drawBall(c,x,y,lv,r){
  const btr= r!==undefined ? r : BT[lv].r;
  const img=ballImages[lv];
  c.save();
  c.translate(x,y);
  c.beginPath();
  c.arc(0,0,btr,0,Math.PI*2);
  c.clip(); // 常に円形クリップ
  // 背景色（画像があっても透過部分に色が出る）
  c.fillStyle=BT[lv].color;
  c.fill();
  if(imagesOK && img && img.complete && img.naturalWidth>0){
    c.drawImage(img,-btr,-btr,btr*2,btr*2);
  } else {
    // ハイライト
    const g=c.createRadialGradient(-btr*.25,-btr*.3,0,0,0,btr);
    g.addColorStop(0,'rgba(255,255,255,.4)');
    g.addColorStop(.7,'rgba(255,255,255,0)');
    c.fillStyle=g;
    c.beginPath();c.arc(0,0,btr,0,Math.PI*2);c.fill();
    // 番号
    c.fillStyle='rgba(255,255,255,.85)';
    c.font=`bold ${Math.max(10,btr*.5)}px sans-serif`;
    c.textAlign='center';c.textBaseline='middle';
    c.fillText(lv+1,0,0);
  }
  c.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);
  // 背景
  ctx.fillStyle='#110820';
  ctx.fillRect(0,0,W,H);

  const dangerY=DANGER_RATIO*H;

  // デンジャーライン
  ctx.save();
  ctx.setLineDash([12,8]);
  const blink=dangerFrames>0 ? `rgba(255,80,80,${.5+.4*Math.sin(Date.now()/150)})` : 'rgba(255,255,255,.35)';
  ctx.strokeStyle=blink;
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,dangerY);ctx.lineTo(W,dangerY);ctx.stroke();
  ctx.restore();

  // フィジクスボール
  if(engine){
    const bodies=Matter.Composite.allBodies(engine.world);
    for(const b of bodies){
      if(b.isStatic||b.label==='wall') continue;
      const lv=bodyMap.get(b.id);
      if(lv===undefined) continue;
      ctx.save();
      ctx.translate(b.position.x,b.position.y);
      ctx.rotate(b.angle);
      ctx.translate(-b.position.x,-b.position.y);
      drawBall(ctx,b.position.x,b.position.y,lv);
      ctx.restore();
    }
  }

  if(gameOver) return;

  // 落下ライン＆現在ボール（ドロップ直後300msは非表示）
  if(showBall){
    const cx=Math.max(BT[curLevel].r+2,Math.min(W-BT[curLevel].r-2,curX));
    ctx.save();
    ctx.setLineDash([5,5]);
    ctx.strokeStyle='rgba(255,255,255,.25)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,dangerY);ctx.lineTo(cx,H);ctx.stroke();
    ctx.restore();
    drawBall(ctx, cx, dangerY-BT[curLevel].r-4, curLevel);
  }
}

// ===== ずんだもん到達バナー =====
let _zundaTimer1=null, _zundaTimer2=null;
let zunda10count=0; // lv10ボールの生成数

function showZundaBanner(isDouble){
  const el=document.getElementById('zunda-banner');
  const txt=document.getElementById('zunda-text');
  if(!el||!txt) return;
  if(_zundaTimer1){clearTimeout(_zundaTimer1);_zundaTimer1=null;}
  if(_zundaTimer2){clearTimeout(_zundaTimer2);_zundaTimer2=null;}
  el.classList.remove('show','hide');
  txt.textContent = isDouble ? 'Wずんだ達成！' : 'ずんだもん到達！';
  _zundaTimer1=setTimeout(()=>{
    el.classList.add('show');
    _zundaTimer2=setTimeout(()=>hideZundaBanner(), 3000);
  }, 1000);
}
function hideZundaBanner(){
  const el=document.getElementById('zunda-banner');
  if(!el) return;
  if(_zundaTimer2){clearTimeout(_zundaTimer2);_zundaTimer2=null;}
  el.classList.remove('show');
  el.classList.add('hide');
  setTimeout(()=>el.classList.remove('hide'), 400);
}
function loop(){
  processMerge();
  checkDanger();
  render();
  rafId=requestAnimationFrame(loop);
}

// ===== ボールバー（スタート画面） =====
function buildBar(){
  const bar=document.getElementById('s-bar');
  if(!bar) return;
  bar.innerHTML='';
  const minSz=16, maxSz=44;
  for(let i=0;i<=10;i++){
    const t=i/10;
    const sz=Math.round(minSz+(maxSz-minSz)*t);
    const c=document.createElement('canvas');
    c.width=sz; c.height=sz;
    c.style.display='block';
    const wrap=document.createElement('div');
    wrap.style.cssText=`width:${sz}px;height:${maxSz}px;display:flex;align-items:center;justify-content:center;flex-shrink:0;`;
    const c2=c.getContext('2d');
    drawBall(c2, sz/2, sz/2, i, sz/2-1);
    wrap.appendChild(c);
    bar.appendChild(wrap);
  }
}

// ===== ゲーム開始 =====
function startGame(){
  gameOver=false; dropCooldown=false; showBall=true; score=0; dangerFrames=0; zunda10count=0;
  mergeQ=[]; bodyMap.clear();
  document.getElementById('go-ov').classList.remove('show');
  updScore();

  // 利用可能エリアから3:4に収まる最大サイズを計算
  const wrapEl = document.getElementById('g-frame-wrap');
  const WALL=18, FLOOR=14;
  const availW = wrapEl.clientWidth;
  const availH = wrapEl.clientHeight;

  // フィールド全体（柱・底込み）で 3:4 を維持
  // フィールド幅 = W + WALL*2、フィールド高 = H + FLOOR
  // (fieldW / fieldH) = 3/4  → fieldH = fieldW * 4/3
  let fieldW = availW;
  let fieldH = fieldW * 4/3;
  if(fieldH > availH){
    fieldH = availH;
    fieldW = fieldH * 3/4;
  }
  fieldW = Math.floor(fieldW);
  fieldH = Math.floor(fieldH);

  W = fieldW - WALL*2;
  H = fieldH - FLOOR;

  // W確定後にボール半径を比率から計算
  initBallRadii();

  // g-fieldのサイズを設定
  const fieldEl = document.getElementById('g-field');
  fieldEl.style.width  = fieldW+'px';
  fieldEl.style.height = fieldH+'px';

  canvas.width  = W;
  canvas.height = H;

  // ネクストcanvasサイズ
  const NC_SZ = 44;
  const NC_SZ1 = 36;
  ['nc0','nc1'].forEach(id=>{
    const c=document.getElementById(id);
    const sz = id==='nc1' ? NC_SZ1 : NC_SZ;
    c.width=sz; c.height=sz;
    c.style.width=sz+'px'; c.style.height=sz+'px';
  });

  // ネクスト枠はCSSでtop:8px固定なので位置調整不要

  curX=W/2;
  initPhysics();
  initQ();
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  loop();
  updNextUI();
}

// ===== 入力 =====
function evX(e){
  const r=canvas.getBoundingClientRect();
  // touchend は touches が空になるので changedTouches を使う
  const src=e.changedTouches?e.changedTouches[0]:e.touches?e.touches[0]:e;
  // canvas座標に変換（canvas外のタッチも対応）
  const cx=src.clientX-r.left;
  return cx*(W/r.width);
}
canvas=null; // 後でセット

// ===== イベント設定 =====
function setupEvents(){
  canvas=document.getElementById('g-canvas');
  ctx=canvas.getContext('2d');

  canvas.addEventListener('mousemove', e=>{curX=evX(e);});
  canvas.addEventListener('click',     e=>{audioUnlock();drop(evX(e));});

  // タッチ操作はscr-game全体（g-nextや余白含む画面最下部まで）に拡張
  // ヘッダー(#g-hdr)のボタン操作は除外する
  const scrGame=document.getElementById('scr-game');
  const gHdr=document.getElementById('g-hdr');
  scrGame.addEventListener('touchmove', e=>{
    if(gHdr.contains(e.target)) return; // ヘッダーは除外
    e.preventDefault();
    curX=evX(e);
  },{passive:false});
  scrGame.addEventListener('touchend', e=>{
    if(gHdr.contains(e.target)) return; // ヘッダーは除外
    e.preventDefault();
    e.stopPropagation();
    audioUnlock();
    drop(evX(e));
  },{passive:false});

  document.addEventListener('touchstart', e=>{
    // 左端30px以内のスワイプバックのみ禁止
    if(e.touches[0].clientX<30) e.preventDefault();
  },{passive:false});
  // documentレベルのtouchmoveはゲーム画面上のみpreventDefault
  document.addEventListener('touchmove', e=>{
    if(e.target===canvas||scrGame.contains(e.target)) e.preventDefault();
  },{passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault(),{passive:false});

  document.getElementById('s-snd').addEventListener('click',()=>{
    soundOn=!soundOn; saveSnd(); updSnd();
    soundOn ? bgmPlay() : bgmStop();
  });
  document.getElementById('g-snd').addEventListener('click',()=>{
    soundOn=!soundOn; saveSnd(); updSnd();
    soundOn ? bgmPlay() : bgmStop();
  });

  document.getElementById('btn-start').addEventListener('click',()=>{
    audioUnlock();
    snd('se_merge');
    if(!isIOS){
      // se_c1をアンロック（iOSポリシー対応）してすぐ停止
      const c1=document.getElementById('se_c1');
      if(c1){ c1.currentTime=0; c1.play().catch(()=>{}); setTimeout(()=>{ try{c1.pause();c1.currentTime=0;}catch(e){} },50); }
    }
    bgmPlay();
    showGame();
    // DOMが再描画されてからサイズ取得
    requestAnimationFrame(()=>requestAnimationFrame(startGame));
  });
  const btnHow=document.getElementById('btn-how');
  if(btnHow) btnHow.addEventListener('click',()=>{ window.open('rule.html','_blank'); });
  function goBack(){
    bgmStop();
    if(runner) Matter.Runner.stop(runner);
    if(rafId){cancelAnimationFrame(rafId);rafId=null;}
    location.reload();
  }
  const gBackBtn=document.getElementById('g-back');
  gBackBtn.addEventListener('click', goBack);
  gBackBtn.addEventListener('touchend', e=>{e.preventDefault();goBack();},{passive:false});

  document.getElementById('go-retry').addEventListener('click', ()=>{ bgmStop(); location.reload(); });
  document.getElementById('go-retry').addEventListener('touchend', e=>{e.preventDefault(); bgmStop(); location.reload();},{passive:false});

  // ずんだもんバナーをタップで消す
  // ずんだもんバナーは3秒後に自動消滅のみ（タップでは消えない）

  history.pushState(null,'',location.href);
  window.addEventListener('popstate',()=>history.pushState(null,'',location.href));

  // バックグラウンド移行時にsrcを空にして再生バーを消す、復帰タッチでsrcを戻してBGM再開
  const AUDIO_SRCS = {
    bgm:      'pic/bgm4.mp3',
    se_drop:  'pic/se_drop.mp3',
    se_merge: 'pic/se_merge.mp3',
    se_c1:    'pic/se_c1.mp3',
  };
  let bgmPausedByVisibility = false;
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){
      bgmPausedByVisibility = true;
      if(_segTimer){ clearTimeout(_segTimer); _segTimer=null; }
      // 全audioをpause→srcを空にしてメディアセッションから切り離す
      Object.keys(AUDIO_SRCS).forEach(id=>{
        try{
          const el=document.getElementById(id);
          if(el){ el.pause(); el.removeAttribute('src'); el.load(); }
        }catch(e){}
      });
    }
  });
  document.addEventListener('touchstart',()=>{
    if(bgmPausedByVisibility && !document.hidden){
      bgmPausedByVisibility = false;
      // srcを元に戻す（SE はsoundOnのときのみ）
      Object.keys(AUDIO_SRCS).forEach(id=>{
        try{
          const el=document.getElementById(id);
          if(!el || el.getAttribute('src')) return;
          // SEはsoundOFFなら復元しない
          if(id !== 'bgm' && !soundOn) return;
          el.src = AUDIO_SRCS[id];
          el.load();
        }catch(e){}
      });
      // ゲーム中かつ未ゲームオーバーならBGM再開
      if(!gameOver && document.getElementById('scr-game').style.display!=='none'){
        bgmPlay();
      }
    }
  },{passive:true});
}

// ===== 起動 =====
document.addEventListener('DOMContentLoaded',()=>{
  loadSt(); loadImages(); setupEvents(); showStart();
});
})();
</script>
