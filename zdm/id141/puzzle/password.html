<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>復活の呪文|ずんだもんがいっぱい！入れ替えパズル</title>
  <meta name="robots" content="noindex">
<link rel="icon" href="pic/favicon.ico">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#000">
<!--favicon-->
<link rel="icon" href="../icon/favicon.ico" type="image/x-icon">
<link rel="icon" href="../icon/i180.png" sizes="180x180" type="image/png">
<link rel="apple-touch-icon" href="../icon/i180.png">
<!--fonts-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
    }
    input[type="text"] {
      background: #111;
      color: #fff;
      border: 1px solid #fff;
      padding: 8px 12px;
      font-size: 16px;
      border-radius: 4px;
      outline: none;
      width: 200px;
    }
    .buttons {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    button {
      background: #222;
      color: #fff;
      border: 1px solid #fff;
      padding: 8px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #444; }
    .pass_b{
      font-weight: 700;
      text-align: center;
      font-size: 20px;
      margin: 1em auto;
    }
    .pass_p1{
      margin: 1em auto;
      width: 90%;
      max-width: 440px;
      text-align: left;
      font-size: 14px;
      line-height: 1.5em;
    }
    .pass_p2{
    	font-size: 10px;
    	width: 90%;
    	max-width: 300px;
    	margin: 2em auto;
    	margin-bottom: 0;
    	line-height: 1.4em;
    	text-align: left;
    }
    .btn_a{
  display: block;
  text-decoration: none;
}
.btn_a p{
  font-size:20px;
  width: 90%;
  max-width: 400px;
  border-radius: 100px;
  background-color: #00bb3e;
  text-align: center;
  font-family: "Noto Sans JP", sans-serif;
  font-weight: 900;
  color: #FFF;
  padding:0.5em 0;
  margin: 0px auto;
  margin-top: 60px;
  text-shadow: 0 0 4px rgba(0,0,0,0.4);
}
  </style>
</head>
<body>
  <div class="container">
    <p class="pass_b"><b>【復活の呪文】</b></p>
    <p class="pass_p1">こちらはセーブデータが消えてしまったとき用に、<br>全面クリアしたという状態にするページです。<br>
    全面クリアをした際に出た復活の呪文をお入れください。</p>    
    <input type="text" id="pw" placeholder="パスワード">
    <div class="buttons">
      <button onclick="check()">送信</button>
      <button onclick="document.getElementById('pw').value=''">リセット</button>
    </div>
    <p class="pass_p2">iPhoneでは7日間ずっとアクセスしない状態でいるとセーブデータが自動で消えるハード的に不可避の仕様があります。<br>またOSのアップデート・スマホ保存容量の限界などでも自動的にセーブデータが消える場合がございます。</p>
    <p>　</p>
    <a href="index.html" class="btn_a"><p>TOPに戻る</p></a>
  </div>
  <script>
    // ↓これは「pass」をSHA-256でハッシュ化した値。
    const CORRECT_HASH = '82a2d6210becae253ee3930c27c387580075bff7597e0b8a1a3754a47fa91a84';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function check() {
      const val = document.getElementById('pw').value;
      const hash = await sha256(val);
      if (hash === CORRECT_HASH) {
        alert('★オールクリアセーブ復活！★');
        localStorage.setItem('nowarea', "1");
        localStorage.setItem('cleararea', "66");
        localStorage.setItem('allclear', "1");
        location.href="index.html";
      } else {
        alert('パスワードが違います');
      }
    }
  </script>
</body>
</html>
