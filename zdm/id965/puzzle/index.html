<script>
//ボタン押下後、画面を50%暗転
const links = document.querySelectorAll('.btn_div a');
links.forEach(a => {
    a.addEventListener('click', function(e) {
        document.body.style.opacity = "0.5";
		setTimeout(function(){
		  document.body.style.opacity = "1";
		}, 2.5*1000);
    });    
});
//初めてのアクセスならつづきからが存在しない
let s2nd_id = document.getElementById("s2nd_id");
let f1st_id = document.getElementById("f1st_id"); 
let f1st_id_B = document.getElementById("f1st_id_B"); 
let gallery_id = document.getElementById("gallery_id"); 
let clearareaKey  = localStorage.getItem("cleararea");
let allclearNum  = localStorage.getItem("allclear");

localStorage.removeItem("nowarea");
if(clearareaKey != null){
	s2nd_id.style.display = "block";
	f1st_id.style.display = "none";
	f1st_id_B.style.display = "block";
}else {
	s2nd_id.style.display = "none";
	f1st_id.style.display = "block";
	f1st_id_B.style.display = "none";
}

if(allclearNum == "1"){
	gallery_id.style.display = "block";
}

f1st_id.addEventListener('click', function(e) {
    fc_clearLocalStrage();
});
//
if (ua.includes("twitter") || ua.includes("line")){
	location.href = "er_browser.html";
}
//
function confirmReset(){
  const result = confirm("セーブデータを全削除します。\nそれでも「はじめから」を選びますか？");
  if (result) {
  	fc_clearLocalStrage();
    return true;  // 遷移する
  } else {  	
  	window.location.reload();
    return false; // 遷移しない    
  }	
}
function fc_clearLocalStrage(){
	localStorage.removeItem("visited");
	localStorage.removeItem("nowarea");
    localStorage.removeItem("cleararea");
    localStorage.removeItem("replay");
    localStorage.removeItem("mmNum");
    localStorage.removeItem("allclear");
    localStorage.removeItem("otoflg");
}
if(!localStorage.getItem("visited")){
	document.body.classList.add("fade-in");
	localStorage.setItem("visited","1");
}
// 画面左端からのスワイプバックを抑制（iOS Safari対策）
document.addEventListener('touchstart', function(e) {
	if (e.touches[0].clientX < 20) {
		e.preventDefault();
	}
}, { passive: false });
</script>
